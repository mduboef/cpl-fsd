
alg: CPL_FSD
alg_kwargs:
  alpha: 0.1
  bcCoeff: 0.0
  bcData: all
  # beta controls the margin/temperature of the FSD surrogate loss.
  # logistic: smooth, continuously penalises all quantile violations.
  # hinge_sq: quadratic penalty only when preferred quantile < rejected + beta.
  # least_squares: IPO-style, penalises both over- and under-satisfaction.
  fsdBeta: 0.01
  fsdLossType: logistic
  bcSteps: 200000

optim: Adam
optim_kwargs:
  lr: 0.0001

network: ActorPolicy
network_kwargs:
  actor_class: ContinuousMLPActor
  actor_kwargs:
    dropout: 0.25 # only actor gets dropout sometimes.
    output_act: ["import", "torch.nn", "Tanh"]
    hidden_layers: [512, 512]
    ortho_init: True

checkpoint: null

eval_env: mw_drawer-open-v2

dataset: FeedbackBuffer
dataset_kwargs:
  path: datasets/mw/pref/mw_drawer-open-v2_ep2500_n0.3.npz
  # larger batch sizes improve FSD distribution estimation - keep >= 64
  batch_size: 96
  segment_length: null # default to 64
  capacity: 2500 # how many segments in the dataset
  label_key: rl_sum
  mode: rank

processor: null

schedule:
  actor: linear_warmup
schedule_kwargs:
  actor:
    total_steps: 10000
    multiplier: 1.0

trainer_kwargs: # arguments given to Algorithm.train
  total_steps: 500000 # the total number of steps to train
  log_freq: 500 # how often to log values
  profile_freq: 500
  eval_freq: 5000 # how often to run evals
  eval_fn: eval_policy
  eval_kwargs:
    num_ep: 25 # number of environment episodes to run for evaluation
  loss_metric: reward # the validation metric that determines when to save the "best_checkpoint"
  train_dataloader_kwargs:
    num_workers: 0 # number of dataloader workers
    batch_size: null

seed: null
